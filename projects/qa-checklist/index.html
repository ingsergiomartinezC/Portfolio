<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Checklist — Pre-publicación</title>
  <style>
    :root { --bg:#0e0f11; --surface:#1c1d21; --border:#2a2b30; --text:#e8e9ec; --muted:#8a8c96; --green:#4ae08c; --red:#ff6b6b; --yellow:#f7c948; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:2rem 1rem; }
    .container { max-width:700px; margin:0 auto; }
    h1 { font-size:1.6rem; margin-bottom:.25rem; }
    .subtitle { color:var(--muted); font-size:.9rem; margin-bottom:2rem; }
    .meta { display:flex; gap:1rem; margin-bottom:2rem; flex-wrap:wrap; }
    .meta input { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:.5rem .75rem; border-radius:8px; font-size:.9rem; flex:1; min-width:180px; }
    .section-title { font-family:monospace; font-size:.72rem; letter-spacing:3px; text-transform:uppercase; color:var(--green); margin:1.5rem 0 .75rem; }
    .item { display:flex; align-items:center; gap:.75rem; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.85rem 1rem; margin-bottom:.5rem; cursor:pointer; transition:border-color .15s; }
    .item:hover { border-color:var(--green); }
    .item.checked { border-color:var(--green); background:rgba(74,224,140,.06); }
    .item.na { border-color:var(--border); opacity:.5; }
    .checkbox { width:20px; height:20px; border:2px solid var(--border); border-radius:5px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:.8rem; transition:all .15s; }
    .item.checked .checkbox { background:var(--green); border-color:var(--green); color:#000; }
    .item-text { flex:1; font-size:.9rem; }
    .na-btn { font-size:.7rem; font-family:monospace; color:var(--muted); background:transparent; border:1px solid var(--border); border-radius:4px; padding:.15rem .4rem; cursor:pointer; }
    .na-btn:hover { color:var(--text); }
    .progress-bar { background:var(--surface); border:1px solid var(--border); border-radius:100px; height:8px; margin-bottom:1.5rem; overflow:hidden; }
    .progress-bar__fill { height:100%; background:var(--green); border-radius:100px; transition:width .3s ease; }
    .stats { display:flex; gap:1rem; margin-bottom:1rem; font-size:.85rem; color:var(--muted); }
    .stats strong { color:var(--text); }
    .export-btn { background:var(--green); color:#000; border:none; padding:.7rem 1.5rem; border-radius:8px; font-size:.9rem; font-weight:700; cursor:pointer; margin-top:2rem; }
    .export-btn:hover { background:#62eca4; }
    .back { color:var(--muted); font-size:.82rem; margin-top:1.5rem; display:block; }
    .back a { color:var(--green); }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ QA Checklist</h1>
    <p class="subtitle">Revisión pre-publicación de cambios en sitio web</p>

    <div class="meta">
      <input id="meta-url" placeholder="URL del sitio / staging" type="url" />
      <input id="meta-rev" placeholder="Responsable de revisión" type="text" />
    </div>

    <div class="progress-bar"><div class="progress-bar__fill" id="progress-fill"></div></div>
    <div class="stats" id="stats">0 de 0 completados</div>

    <div id="checklist"></div>

    <button class="export-btn" onclick="exportReport()">📥 Exportar reporte JSON</button>
    <span class="back">← <a href="../../index.html">Volver al portafolio</a></span>
  </div>

  <script>
    const items = [
      { section: 'Visual & Responsive', checks: [
        'Revisado en mobile (320px–768px)',
        'Revisado en tablet (768px–1024px)',
        'Revisado en desktop (1280px+)',
        'Sin texto desbordado ni elementos cortados',
        'Imágenes cargan correctamente y tienen atributo alt',
        'Fuentes cargan en todos los dispositivos',
      ]},
      { section: 'Funcionalidad', checks: [
        'Todos los enlaces funcionan (sin 404)',
        'Formularios envían correctamente',
        'Animaciones y transiciones funcionan sin errores',
        'JavaScript sin errores en consola',
        'CMS: contenidos actualizados correctamente',
      ]},
      { section: 'Performance & SEO básico', checks: [
        'Título de página correcto (<title>)',
        'Meta description presente',
        'Imágenes optimizadas (WebP / comprimidas)',
        'Sin recursos bloqueantes evidentes',
        'Favicon presente',
      ]},
      { section: 'Control de versiones', checks: [
        'Cambios commiteados con mensaje semántico',
        'PR revisado antes de merge',
        'Respaldo de BD tomado antes del despliegue',
        'Código mergeado a rama correcta',
      ]},
    ];

    const state = {};
    const cl = document.getElementById('checklist');

    items.forEach(group => {
      const title = document.createElement('div');
      title.className = 'section-title';
      title.textContent = group.section;
      cl.appendChild(title);

      group.checks.forEach((text, i) => {
        const id = `${group.section}-${i}`;
        state[id] = 'pending';

        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div class="checkbox">✓</div>
          <span class="item-text">${text}</span>
          <button class="na-btn" onclick="toggleNA(event,'${id}')">N/A</button>
        `;
        div.addEventListener('click', (e) => {
          if (e.target.classList.contains('na-btn')) return;
          if (state[id] === 'na') return;
          state[id] = state[id] === 'done' ? 'pending' : 'done';
          div.classList.toggle('checked', state[id] === 'done');
          updateStats();
        });
        div.dataset.id = id;
        cl.appendChild(div);
      });
    });

    function toggleNA(e, id) {
      e.stopPropagation();
      state[id] = state[id] === 'na' ? 'pending' : 'na';
      const el = document.querySelector(`[data-id="${id}"]`);
      el.classList.toggle('na', state[id] === 'na');
      el.classList.remove('checked');
      updateStats();
    }

    function updateStats() {
      const total = Object.keys(state).length;
      const done = Object.values(state).filter(s => s === 'done').length;
      const na = Object.values(state).filter(s => s === 'na').length;
      const applicable = total - na;
      const pct = applicable > 0 ? Math.round((done / applicable) * 100) : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('stats').innerHTML = `<strong>${done}</strong> de <strong>${applicable}</strong> completados (${na} N/A) · <strong>${pct}%</strong>`;
    }

    function exportReport() {
      const report = {
        fecha: new Date().toISOString(),
        url: document.getElementById('meta-url').value,
        responsable: document.getElementById('meta-rev').value,
        items: state,
        resumen: {
          total: Object.keys(state).length,
          completados: Object.values(state).filter(s=>s==='done').length,
          pendientes: Object.values(state).filter(s=>s==='pending').length,
          na: Object.values(state).filter(s=>s==='na').length,
        }
      };
      const blob = new Blob([JSON.stringify(report, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `qa-report-${Date.now()}.json`;
      a.click();
    }

    updateStats();
  </script>
</body>
</html>
